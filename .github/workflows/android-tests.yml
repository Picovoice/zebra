name: Android Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/android-tests.yml'
      - 'binding/android/ZebraTestApp/**'
      - 'resources/.test/**'
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+']
    paths:
      - '.github/workflows/android-tests.yml'
      - 'binding/android/ZebraTestApp/**'
      - 'resources/.test/**'

defaults:
  run:
    working-directory: binding/android/ZebraTestApp

jobs:
  test:
    name: Run Android Tests
    runs-on: pv-android

    steps:
    - uses: actions/checkout@v3

    ############## REMOVE AFTER RELEASE ##########################
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        java-version: 11
        distribution: 'temurin'

    - name: Build binding
      run: ./gradlew assembleRelease --info
      working-directory: binding/android/Zebra
    ############## REMOVE AFTER RELEASE ##########################

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Uninstall previous app
      run: ~/Android/Sdk/platform-tools/adb shell pm uninstall ai.picovoice.zebra.testapp || true

    - name: Uninstall previous tests
      run: ~/Android/Sdk/platform-tools/adb shell pm uninstall ai.picovoice.zebra.testapp.test || true

    - name: Copy test_resources
      run: ./copy_test_resources.sh

    - name: Inject AccessKey
      run: echo pvTestingAccessKey="${{secrets.PV_VALID_ACCESS_KEY}}" >> local.properties

    - name: Inject device string
      run: echo pvTestingDevice="best" >> local.properties

    - name: Inject Android keystore variables
      run: |
        echo storePassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyPassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyAlias=picovoice >> local.properties
        echo storeFile=../picovoice.jks >> local.properties

    - name: Setup Android keystore file
      run: echo "${{secrets.ANDROID_RELEASE_KEYSTORE_FILE_B64}}" | base64 -d > picovoice.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build app
      run: ./gradlew assembleEnfrDebug --info

    - name: Build androidTest
      run: ./gradlew assembleEnfrDebugAndroidTest --info

    - name: Run tests
      run: ./gradlew connectedEnfrDebugAndroidTest --info -Pandroid.testInstrumentationRunnerArguments.class=ai.picovoice.zebra.testapp.StandardTests,ai.picovoice.zebra.testapp.TranslateTests

  test-integ:
    name: Run Android Integ Tests
    runs-on: pv-android

    steps:
    - uses: actions/checkout@v3

      ############## REMOVE AFTER RELEASE ##########################
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        java-version: 11
        distribution: 'temurin'

    - name: Build binding
      run: ./gradlew assembleRelease --info
      working-directory: binding/android/Zebra
    ############## REMOVE AFTER RELEASE ##########################

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Uninstall previous app
      run: ~/Android/Sdk/platform-tools/adb shell pm uninstall ai.picovoice.zebra.testapp || true

    - name: Uninstall previous tests
      run: ~/Android/Sdk/platform-tools/adb shell pm uninstall ai.picovoice.zebra.testapp.test || true

    - name: Copy test_resources
      run: ./copy_test_resources.sh

    - name: Inject AccessKey
      run: echo pvTestingAccessKey="${{secrets.PV_VALID_ACCESS_KEY}}" >> local.properties

    - name: Inject device string
      run: echo pvTestingDevice="best" >> local.properties

    - name: Inject Android keystore variables
      run: |
        echo storePassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyPassword="${{secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD}}" >> local.properties
        echo keyAlias=picovoice >> local.properties
        echo storeFile=../picovoice.jks >> local.properties

    - name: Setup Android keystore file
      run: echo "${{secrets.ANDROID_RELEASE_KEYSTORE_FILE_B64}}" | base64 -d > picovoice.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build app
      run: ./gradlew assembleEnfrDebug --info

    - name: Build androidTest
      run: ./gradlew assembleEnfrDebugAndroidTest -DtestBuildType=integ --info

    - name: Run tests
      run: ./gradlew connectedEnfrDebugAndroidTest --info -Pandroid.testInstrumentationRunnerArguments.class=ai.picovoice.zebra.testapp.IntegrationTest
